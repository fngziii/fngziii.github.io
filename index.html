<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คหวย - งวด 16 มีนา </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

<style>
body{background:#f0f2f5;font-family:'Sarabun',sans-serif;padding-bottom:80px}
.container{max-width:600px}
.stat-card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ticket-item{background:#fff;border-radius:12px;margin-bottom:10px;padding:15px;border-left:6px solid #e9ecef}
.status-free{border-left-color:#ced4da}
.status-pending{border-left-color:#ffc107;background:#fffbf0}
.status-paid{border-left-color:#198754;background:#f0f9f4}
.lotto-num{font-size:1.6rem;font-weight:800;letter-spacing:2px}
.pair-badge{font-size: 0.8rem; vertical-align: middle; margin-left: 5px;}
</style>
</head>

<body>
<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <small class="text-muted" style="font-size:12px">ระบบเช็คหวย (ขายยกคู่ทั้งหมด 94 ใบ)</small>
    <h5 class="fw-bold m-0">
      <i class="fas fa-store text-primary"></i> งวด 16 มี.ค. 69
    </h5>
  </div>
  <div class="text-end">
    <button class="btn btn-sm btn-primary mb-1" onclick="showPersonSummary()">สรุปรายคน</button>
    <button class="btn btn-sm btn-dark mb-1" onclick="showSummary()">สรุปยอด</button>
    <button class="btn btn-sm btn-outline-danger" onclick="clearData()">ล้างใหม่</button>
  </div>
</div>

<div class="row g-2 mb-3">
  <div class="col-6">
    <div class="stat-card">
      <small class="text-muted">ขายแล้ว (คู่)</small>
      <div class="fw-bold text-primary" id="soldCount">0</div>
    </div>
  </div>
  <div class="col-6">
    <div class="stat-card">
      <small class="text-muted">รับเงินแล้ว (บาท)</small>
      <div class="fw-bold text-success" id="moneyCount">0</div>
    </div>
  </div>
</div>

<input id="searchInput" class="form-control form-control-lg mb-3"
 placeholder="🔍 ค้นหาเลข..." onkeyup="renderList()">

<div id="lottoList"></div>
</div>

<div class="modal fade" id="personModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title fw-bold">สรุปรายคน (ค้างจ่าย)</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<select id="personSelect" class="form-select mb-2" onchange="renderPersonSummary()"></select>
<pre id="personSummaryText" class="p-3 bg-light rounded"></pre>
</div>
<div class="modal-footer">
<button class="btn btn-success w-100" onclick="copyPersonSummary()">ก๊อปปี้ส่งลูกค้า</button>
</div>
</div>
</div>
</div>

<div class="modal fade" id="summaryModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title fw-bold">สรุปยอดทั้งหมด</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<pre id="summaryText" class="p-3 bg-light rounded"></pre>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// แก้ไข: ราคาต่อ 1 คู่ (2 ใบ)
const PRICE_PER_PAIR = 200; 
const BANK_INFO = `🏦 ธนาคารออมสิน
เลขบัญชี 020-1-25404-630
ชื่อบัญชี นันท์ภสร ขอบรูป`;

const rawData = [
  "166301", // 01
  "447302", // 02
  "180604", // 04
  "311214", // 14
  "529514", // 14
  "133920", // 20
  "465225", // 25
  "227526", // 26
  "332027", // 27
  "748936", // 36
  "821336", // 36
  "535338", // 38
  "794838", // 38
  "249440", // 40
  "679743", // 43
  "080344", // 44
  "393845", // 45
  "702945", // 45
  "732745", // 45
  "152447", // 47
  "173547", // 47
  "440147", // 47
  "992648", // 48
  "538250", // 50
  "925150", // 50
  "966751", // 51
  "033352", // 52
  "968653", // 53
  "315054", // 54
  "637754", // 54
  "827160", // 60
  "948560", // 60
  "965360", // 60
  "456561", // 61
  "742463", // 63
  "926764", // 64
  "448072", // 72
  "830072", // 72
  "595180", // 80
  "062281", // 81
  "345081", // 81
  "703781", // 81
  "670182", // 82
  "881082", // 82
  "164783", // 83
  "042984", // 84
  "983790"  // 90
];


let tickets=[];

function init(){
const saved=localStorage.getItem("myLottoShop");
if(saved) tickets=JSON.parse(saved);
else resetTickets();
renderList();
}

function resetTickets(){
// เก็บข้อมูลเป็นรายคู่ (1 เลข คือ 2 ใบ)
tickets=rawData.map(n=>({number:n,price:PRICE_PER_PAIR,customer:"",isPaid:false}));
save();
}

function renderList(){
const s=document.getElementById("searchInput").value;
const list=document.getElementById("lottoList");
list.innerHTML="";
let sold=0,money=0;

tickets.forEach((t,i)=>{
if(t.customer){
sold++;
if(t.isPaid)money+=PRICE_PER_PAIR;
}
if(!t.number.includes(s))return;

list.innerHTML+=`
<div class="ticket-item ${t.customer?(t.isPaid?'status-paid':'status-pending'):'status-free'}">
<div class="d-flex justify-content-between mb-2">
<div>
    <span class="lotto-num">${t.number}</span>   
</div>
<span class="badge ${t.customer?(t.isPaid?'bg-success':'bg-warning text-dark'):'bg-secondary'}">
${t.customer?(t.isPaid?'จ่ายแล้ว':'รอโอน'):'ว่าง'}
</span>
</div>
<div class="row g-2">
<div class="col-8">
<input class="form-control form-control-sm" placeholder="ชื่อลูกค้า"
value="${t.customer}" onchange="updateCustomer(${i},this.value)">
</div>
<div class="col-4">
<button class="btn btn-sm w-100 ${t.isPaid?'btn-success':'btn-outline-secondary'}"
onclick="togglePaid(${i})" ${!t.customer?'disabled':''}>
${t.isPaid?'รับแล้ว':'รับเงิน'}
</button>
</div>
</div>
</div>`;
});

// แสดงผลจำนวนคู่
soldCount.innerText=sold+"/47 คู่";
moneyCount.innerText=money.toLocaleString();
}

function updateCustomer(i,v){
tickets[i].customer=v;
if(!v)tickets[i].isPaid=false;
save();
}

function togglePaid(i){
tickets[i].isPaid=!tickets[i].isPaid;
save();
}

function save(){
localStorage.setItem("myLottoShop",JSON.stringify(tickets));
renderList();
}

function clearData(){
if(confirm("ล้างข้อมูลทั้งหมด?"))resetTickets();
}

function showPersonSummary(){
const names=[...new Set(tickets.filter(t=>t.customer&&!t.isPaid).map(t=>t.customer))];
personSelect.innerHTML='<option value="">เลือกลูกค้า</option>';
names.forEach(n=>personSelect.innerHTML+=`<option>${n}</option>`);
personSummaryText.innerText="";
new bootstrap.Modal(personModal).show();
}

function renderPersonSummary(){
const name=personSelect.value;
if(!name)return;
const items=tickets.filter(t=>t.customer===name&&!t.isPaid);
let txt=`📌 สรุปยอดคุณ ${name}\n\n`;
txt+=`เลขที่ซื้อ (คู่ละ 2 ใบ):\n`;
items.forEach(i=>txt+=`- ${i.number} (2 ใบ)\n`);
txt+=`\n💰 ยอดที่ต้องโอน ${items.length*PRICE_PER_PAIR} บาท\n\n${BANK_INFO}`;
personSummaryText.innerText=txt;
}

function copyPersonSummary(){
navigator.clipboard.writeText(personSummaryText.innerText)
.then(()=>alert("ก๊อปปี้เรียบร้อย"));
}

function showSummary(){
let sold=0,paid=0,pending=0,money=0;

tickets.forEach(t=>{
if(t.customer){
sold++;
if(t.isPaid){
paid++;
money+=PRICE_PER_PAIR;
}else{
pending++;
}
}
});

summaryText.innerText=
`📊 สรุปยอดทั้งหมด (หน่วย: คู่)

🎟️ ขายแล้ว ${sold} คู่ (${sold * 2} ใบ)
💸 รับเงินแล้ว ${paid} คู่
⏳ ค้างจ่าย ${pending} คู่
💰 เงินที่รับแล้ว ${money.toLocaleString()} บาท
`;

new bootstrap.Modal(summaryModal).show();
}

init();
</script>
</body>
</html>
